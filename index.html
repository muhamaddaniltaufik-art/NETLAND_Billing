<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NETLAND Billing</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head><body>
<h1>NETLAND Billing</h1>
<div class="card">
<input id="nama" placeholder="Nama Pelanggan">
<input id="wa" placeholder="WhatsApp">
<input
type="number"
id="dueDate"
placeholder="Tanggal Jatuh Tempo (1-31)">
  <select id="paket">
<option value="135000">Up To 30 Mbps - Rp135.000</option>
<option value="165000">Up To 50 Mbps - Rp165.000</option>
</select>
<button onclick="tambah()">Tambah Pelanggan</button>
</div>
<div class="hero">
  <h1>🌐 NETLAND Billing</h1>
  <p>Sistem Manajemen Pelanggan & Tagihan Internet</p>
</div>
  <div class="toolbar">
<div class="stats">

  <div class="stat">
    <i class="bi bi-people-fill"></i>
    <h2 id="totalCustomer">0</h2>
    <p>Total Pelanggan</p>
  </div>

  <div class="stat">
    <i class="bi bi-check-circle-fill"></i>
    <h2 id="totalPaid">0</h2>
    <p>Lunas</p>
  </div>

  <div class="stat">
    <i class="bi bi-exclamation-circle-fill"></i>
    <h2 id="totalDue">0</h2>
    <p>Menunggak</p>
  </div>

  <div class="stat">
    <i class="bi bi-cash-stack"></i>
    <h2 id="revenue">Rp0</h2>
    <p>Pendapatan</p>
  </div>

</div>
  
<input
id="search"
placeholder="Cari pelanggan..."
onkeyup="render()">

<select
id="filterStatus"
onchange="render()">

<option value="Semua">Semua</option>
<option value="Aktif">Aktif</option>
<option value="Lunas">Lunas</option>
<option value="Menunggak">Menunggak</option>
<option value="Suspend">Suspend</option>

</select>

<button onclick="exportBackup()">
Backup JSON
</button>

<button onclick="exportCSV()">
Export CSV
</button>

<input
type="file"
id="restoreFile">

<button onclick="restoreJSON()">
Restore
</button>

</div>

<hr>
  <div id="dashboard">

<h3>Total Pelanggan:
<span id="totalCustomer">0</span>
</h3>

<h3>Lunas:
<span id="totalPaid">0</span>
</h3>

<h3>Menunggak:
<span id="totalLate">0</span>
</h3>

<h3>Pendapatan Bulan Ini:
<span id="income">Rp0</span>
</h3>

</div>

<hr>
  <h2>Daftar Pelanggan</h2>
<ul id="list"></ul>
<script src="app.js"></script>
</body></html>
